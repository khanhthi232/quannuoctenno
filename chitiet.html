<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quán nước tên Nờ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Quán nước tên Nờ</div>
        <ul class="nav-links">
            <li><a href="index.html">Trang Chủ</a></li>
            <li><a href="thucdon.html">Thực Đơn</a></li>
            <li><a href="cuahang.html">Cửa Hàng</a></li>
            <li><a href="lienhe.html">Liên Hệ</a></li>
        </ul>
        <div class="cart-icon">🛒 <span class="cart-badge">2</span></div>
    </nav>

    <div class="detail-container">
        
        <div class="image-gallery">
            <img class="main-img" src="caphe.jpg" alt="Cà Phê Sương Sáo">
            <div class="thumb-images">
                <img class="active" src="caphe.jpg" alt="Ảnh nhỏ 1">
                <img src="caphe.jpg" alt="Ảnh nhỏ 2">
            </div>
        </div>

        <div class="info-section">
            <h1>Trà Quýt</h1>
            <p class="description">Một ly đậm trà, thơm quýt tươi tự nhiên, chua nhẹ là đủ để giải khát cho mùa hè này rồi đó 😍 Khách ghé quán Nờ thưởng thức nhaaa</p>
            <div class="price-detail">Giá: 350.000.000đ</div>
            
            <div class="quantity-selector">
                <label>Số lượng:</label>
                <button onclick="this.parentNode.querySelector('input').stepDown()">-</button>
                <input type="number" value="1" min="1">
                <button onclick="this.parentNode.querySelector('input').stepUp()">+</button>
            </div>

            <button class="btn-cart">Thêm Vào Giỏ Hàng</button>
        </div>
        
    </div>

    <div class="related-section">
        <h3>Sản Phẩm Liên Quan</h3>
        <div class="related-grid">
            <div class="related-card">
                <img src="buoi.jpg" alt="Cà Phê Trứng">
                <p style="margin-top:5px; font-weight:500;">Trà Bưởi</p>
            </div>
            <div class="related-card">
                <img src="xoai.jpg" alt="Trà Xoài">
                <p style="margin-top:5px; font-weight:500;">Trà Xoài</p>
            </div>
            <div class="related-card">
                <img src="khoaimon.jpg" alt="Trà Sữa Khoai Môn">
                <p style="margin-top:5px; font-weight:500;">Trà Sữa Khoai Môn</p>
            </div>
        </div>
    </div>

</body>
</html>
